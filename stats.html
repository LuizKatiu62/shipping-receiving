<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Operations Dashboard — Source Atlantic SR</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#f0f4f8;--card:#fff;--border:#e2e8f0;
  --text:#0f172a;--muted:#64748b;--light:#94a3b8;
  --blue:#1e40af;--blue2:#2563eb;--blue3:#3b82f6;--blue4:#bfdbfe;
  --cyan:#0891b2;--cyan2:#22d3ee;
  --purple:#7c3aed;--purple2:#a78bfa;
  --green:#059669;--red:#dc2626;
  --shadow:0 1px 3px rgba(0,0,0,.09),0 1px 2px rgba(0,0,0,.06);
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);border-bottom:1px solid rgba(255,255,255,.08)}
.hdr-inner{max-width:1420px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:16px 28px;gap:12px;flex-wrap:wrap}
.hdr-logo{width:38px;height:38px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;color:#fff;letter-spacing:-.5px;flex-shrink:0}
.hdr-title{font-size:.98rem;font-weight:700;color:#fff;line-height:1.2}
.hdr-sub{font-size:.67rem;color:rgba(255,255,255,.4);margin-top:1px}
.hdr-date{font-size:.7rem;color:rgba(255,255,255,.4)}
.btn-back{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.8);padding:7px 14px;border-radius:8px;font-size:.74rem;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit;transition:all .18s}
.btn-back:hover{background:rgba(255,255,255,.2);color:#fff}

/* ── FILTER BAR ── */
.fbar{background:linear-gradient(90deg,#1e3a5f 0%,#1e40af 100%);border-bottom:2px solid #1e3a8a;padding:13px 28px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.fbar-inner{max-width:1420px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.flabel{font-size:.72rem;font-weight:800;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.8px}
.fsel{padding:8px 14px;border:1.5px solid rgba(255,255,255,.3);border-radius:8px;font-size:.86rem;font-weight:700;color:#fff;background:rgba(255,255,255,.12);cursor:pointer;outline:none;font-family:inherit;transition:all .18s}
.fsel:hover{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.5)}
.fsel:focus{border-color:#fff;background:rgba(255,255,255,.22)}
.fsel option{background:#1e3a5f;color:#fff}
.vs-chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:4px 10px;font-size:.72rem;font-weight:800;color:rgba(255,255,255,.9)}
.fsep{width:1px;height:28px;background:rgba(255,255,255,.25);margin:0 6px}
.fnote{font-size:.68rem;color:var(--light);margin-left:auto}

/* ── BODY ── */
.body{max-width:1420px;margin:0 auto;padding:22px 28px 44px}

/* ── KPI CARDS ── */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:18px}
.kpi{background:var(--card);border-radius:var(--r);padding:20px 22px 16px;box-shadow:var(--shadow);border:1px solid var(--border);position:relative;overflow:hidden;display:flex;flex-direction:column;gap:10px}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.blue::before{background:linear-gradient(90deg,var(--blue),var(--blue3))}
.kpi.cyan::before{background:linear-gradient(90deg,var(--cyan),var(--cyan2))}
.kpi.purple::before{background:linear-gradient(90deg,var(--purple),var(--purple2))}
.kpi-top{display:flex;align-items:center;justify-content:space-between}
.kpi-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.kpi-icon{font-size:1.25rem;opacity:.75}
.kpi-num{font-size:2.6rem;font-weight:800;line-height:1;letter-spacing:-1.5px}
.kpi.blue .kpi-num{color:var(--blue)}
.kpi.cyan .kpi-num{color:var(--cyan)}
.kpi.purple .kpi-num{color:var(--purple)}
.kpi-foot{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.kbadge{display:inline-flex;align-items:center;gap:2px;padding:3px 9px;border-radius:20px;font-size:.68rem;font-weight:700}
.kbadge.up{background:#dcfce7;color:#16a34a}
.kbadge.dn{background:#fee2e2;color:#dc2626}
.kbadge.eq{background:#f1f5f9;color:var(--muted)}
.kpi-vs{font-size:.69rem;color:var(--light)}
.kpi-months{display:flex;gap:18px;border-top:1px solid var(--border);padding-top:10px;margin-top:2px}
.kmo{display:flex;flex-direction:column;gap:1px}
.kmo-val{font-size:.88rem;font-weight:700}
.kmo-lbl{font-size:.6rem;color:var(--light);text-transform:uppercase;letter-spacing:.3px}

/* ── CARD ── */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border)}
.ch{padding:14px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ct{font-size:.77rem;font-weight:700;color:var(--text)}
.cs{font-size:.66rem;color:var(--light);margin-top:2px}
.cb{padding:14px 20px 18px}
.cw{position:relative}

/* ── ROWS ── */
.r1{margin-bottom:18px}
.r2{display:grid;gap:16px;margin-bottom:18px}
.r2.g6040{grid-template-columns:3fr 2fr}
.r2.g5545{grid-template-columns:55fr 45fr}

/* ── YOY PANEL ── */
.yoy-list{display:flex;flex-direction:column;gap:16px;padding:4px 0}
.yitem-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.yitem-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.yitem-nums{display:flex;justify-content:space-between;font-size:.71rem;color:var(--light);margin-bottom:5px}
.ytrack{height:7px;background:#f1f5f9;border-radius:4px;overflow:hidden}
.yfill{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.yfill.blue{background:linear-gradient(90deg,var(--blue),var(--blue3))}
.yfill.cyan{background:linear-gradient(90deg,var(--cyan),var(--cyan2))}
.yfill.purple{background:linear-gradient(90deg,var(--purple),var(--purple2))}

/* ── FREIGHT STATS ── */
.fstats{display:flex;gap:24px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.fstat{text-align:center}
.fstat-num{font-size:1.4rem;font-weight:800}
.fstat-lbl{font-size:.62rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:1px}

/* ── TABLE ── */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.76rem}
thead tr{background:linear-gradient(180deg,#1e3a8a,#2563eb)}
thead th{color:rgba(255,255,255,.9);padding:9px 11px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;text-align:right;white-space:nowrap}
thead th:first-child{text-align:left;width:72px}
thead th.gs{border-left:1px solid rgba(255,255,255,.2)}
.cspan{text-align:center}
tbody tr{border-bottom:1px solid #f1f5f9;transition:background .1s}
tbody tr:hover{background:#f8faff}
tbody tr.dim{opacity:.3}
tbody tr.tot{background:#f0f4f8;font-weight:700;border-top:2px solid #d1d5db}
tbody tr.ytd-row{background:#eff6ff;font-weight:700}
td{padding:8px 11px;text-align:right;white-space:nowrap}
td:first-child{text-align:left;font-weight:600;font-size:.74rem;color:#334155}
td.gs{border-left:1px solid #f1f5f9}
td.cur{font-weight:700;color:var(--blue)}
td.pv{color:#94a3b8}
td.dlt{font-weight:700;font-size:.69rem}
td.dlt.up{color:#16a34a}
td.dlt.dn{color:#dc2626}
td.dlt.eq{color:#94a3b8}

/* ── LOADING ── */
.loading{text-align:center;padding:70px;color:var(--light);font-size:.85rem}

/* ── INTERACTIVE ── */
.chip-btn{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.38);border-radius:20px;padding:3px 12px;font-size:.68rem;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;transition:all .15s}
.chip-btn:hover{background:rgba(255,255,255,.32)}
.chips-bar{background:#1e3a5f;border-bottom:1px solid rgba(255,255,255,.08);padding:7px 28px;display:none}
.chips-inner{max-width:1420px;margin:0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chips-label{font-size:.62rem;font-weight:800;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.8px}
.chip-clear{background:rgba(220,38,38,.35);border-color:rgba(220,38,38,.5)}
.chip-clear:hover{background:rgba(220,38,38,.55)}
tbody tr.row-hl{background:#dbeafe!important}
tbody tr.row-hl td{font-weight:700}
tbody tr.row-hl td.cur{color:#1e3a8a;font-weight:900}
tbody tr.row-dim{opacity:.28}
tbody tr.row-click{cursor:pointer}
tbody tr.row-click:hover{background:#f0f7ff}

@media(max-width:960px){
  .kpi-row{grid-template-columns:1fr}
  .r2.g6040,.r2.g5545{grid-template-columns:1fr}
  .body{padding:14px 16px 32px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <div style="display:flex;align-items:center;gap:12px">
      <img src="logo.png" alt="Source Atlantic" style="height:38px;width:auto;border-radius:6px;background:#fff;padding:3px 7px;display:block;flex-shrink:0">
      <div>
        <div class="hdr-title">Operations Dashboard</div>
        <div class="hdr-sub">Source Atlantic — Industrial Services</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="hdr-date" id="hdr-date"></span>
      <a class="btn-back" href="map.html" target="sa-map">🗺️ Map</a>
      <a class="btn-back" href="index.html">← Back to App</a>
    </div>
  </div>
</div>

<div class="fbar">
  <div class="fbar-inner">
    <span class="flabel">Compare</span>
    <select class="fsel" id="sel-curr" onchange="render()">
      <option value="2026">2026</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
    </select>
    <span class="vs-chip">vs</span>
    <select class="fsel" id="sel-prev" onchange="render()">
      <option value="2025">2025</option>
      <option value="2024">2024</option>
      <option value="2026">2026</option>
    </select>
    <div class="fsep"></div>
    <span class="flabel">Period</span>
    <select class="fsel" id="sel-from" onchange="render()">
      <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option>
      <option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option>
      <option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option>
      <option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option>
    </select>
    <span class="vs-chip">to</span>
    <select class="fsel" id="sel-to" onchange="render()">
      <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option>
      <option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option>
      <option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option>
      <option value="9">Oct</option><option value="10">Nov</option><option value="11" selected>Dec</option>
    </select>
    <span class="fnote" id="fnote"></span>
  </div>
</div>

<div class="chips-bar" id="chips-bar">
  <div class="chips-inner">
    <span class="chips-label">Filters:</span>
    <div id="chips" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    <button class="chip-btn chip-clear" onclick="clearAllFilters()">✕ Clear all</button>
  </div>
</div>

<div class="body" id="body">
  <div class="loading">Loading data…</div>
</div>

<script>
var firebaseConfig = {
  apiKey:            'AIzaSyBuS3afVcx3W-zfgZfDYIutNltuEfP8Fhc',
  authDomain:        'source-atlantic-sr.firebaseapp.com',
  databaseURL:       'https://source-atlantic-sr-default-rtdb.firebaseio.com',
  projectId:         'source-atlantic-sr',
  storageBucket:     'source-atlantic-sr.firebasestorage.app',
  messagingSenderId: '953329380095',
  appId:             '1:953329380095:web:f7865dda88a33ff9457aca'
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

var MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var allData = {incoming:{}, items:{}, shipping:{}, process:{}};
var loaded = 0;
var CH = {};

var AREAS = ['Electrical','Mechanical','Air Compressor','Generator'];
var AREA_COLS = {'Electrical':'#1e40af','Mechanical':'#0891b2','Air Compressor':'#059669','Generator':'#d97706'};

var now = new Date();
document.getElementById('hdr-date').textContent =
  'As of ' + now.toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric'});

function onLoad(){ loaded++; if(loaded>=4) render(); }
db.ref('shipping_receiving/incoming').on('value',function(s){ allData.incoming=s.val()||{}; onLoad(); });
db.ref('shipping_receiving/items').on('value',function(s){ allData.items=s.val()||{}; onLoad(); });
db.ref('shipping_receiving/shipping').on('value',function(s){ allData.shipping=s.val()||{}; onLoad(); });
db.ref('shipping_receiving/process').on('value',function(s){ allData.process=s.val()||{}; onLoad(); });

function computeTurnaround(cYr, moFrom, moTo, inRangeFn){
  var woProcDate = {};
  Object.values(allData.process).forEach(function(r){
    if(!r.wo||!r.receivedDate) return;
    var k=r.wo.trim().toUpperCase();
    if(!woProcDate[k]||r.receivedDate<woProcDate[k]) woProcDate[k]=r.receivedDate;
  });
  var woShipDate = {};
  Object.values(allData.shipping).forEach(function(r){
    if(!r.date) return;
    (r.workOrders||[]).forEach(function(wo){
      var k=wo.trim().toUpperCase();
      if(!woShipDate[k]||r.date<woShipDate[k]) woShipDate[k]=r.date;
    });
  });
  var todayStr=now.toISOString().slice(0,10);
  return Object.values(allData.incoming)
    .filter(function(r){ return r.formNum&&r.wo&&r.date&&inRangeFn(r.date,cYr,moFrom,moTo); })
    .map(function(r){
      var k=r.wo.trim().toUpperCase();
      var pd=woProcDate[k], sd=woShipDate[k];
      var endDate=null, status='Active';
      if(sd){ endDate=sd; status='Shipped'; }
      else if(pd){ endDate=pd; status='On Hold'; }
      var days=Math.max(0,Math.floor((new Date((endDate||todayStr)+'T00:00:00')-new Date(r.date+'T00:00:00'))/86400000));
      return {area:r.area||'', status:status, days:days};
    });
}

function byMonth(data, yr){
  var c = new Array(12).fill(0);
  Object.values(data).forEach(function(r){
    var d = r.date||''; if(!d.startsWith(yr)) return;
    var m = parseInt(d.slice(5,7),10)-1; if(m>=0&&m<12) c[m]++;
  }); return c;
}
function sum(arr,from,to){ return arr.slice(from,to+1).reduce(function(a,b){return a+b;},0); }
function pct(cu,pv){ if(!pv) return null; return Math.round((cu-pv)/pv*100); }
function badge(p){
  if(p===null) return '<span class="kbadge eq">—</span>';
  return '<span class="kbadge '+(p>0?'up':p<0?'dn':'eq')+'">'+(p>0?'▲ ':'▼ ')+Math.abs(p)+'%</span>';
}
function dlt(p){
  if(p===null) return '<td class="dlt eq">—</td>';
  return '<td class="dlt '+(p>0?'up':p<0?'dn':'eq')+'">'+(p>0?'▲ ':'▼ ')+Math.abs(p)+'%</td>';
}
function dc(id){ if(CH[id]){ CH[id].destroy(); delete CH[id]; } }

var activeFilters = {month:null, carrier:null, customer:null, dest:null, area:null};

function toggleFilter(key, val){
  activeFilters[key] = (activeFilters[key] === val) ? null : val;
  render();
}
function clearFilter(key){ activeFilters[key] = null; render(); }
function clearAllFilters(){
  Object.keys(activeFilters).forEach(function(k){ activeFilters[k] = null; });
  render();
}
function updateChips(){
  var any = Object.values(activeFilters).some(function(v){ return v !== null; });
  var bar = document.getElementById('chips-bar');
  var el  = document.getElementById('chips');
  if(bar) bar.style.display = any ? 'flex' : 'none';
  if(!el) return;
  var h = '';
  if(activeFilters.month    !== null) h += mkChip('📅 '+MO[activeFilters.month],"clearFilter('month')");
  if(activeFilters.carrier)           h += mkChip('🚚 '+activeFilters.carrier,"clearFilter('carrier')");
  if(activeFilters.customer)          h += mkChip('👤 '+activeFilters.customer,"clearFilter('customer')");
  if(activeFilters.dest)              h += mkChip('📦 '+activeFilters.dest,"clearFilter('dest')");
  if(activeFilters.area)              h += mkChip('🏷️ '+activeFilters.area,"clearFilter('area')");
  el.innerHTML = h;
}
function mkChip(lbl, fn){
  return '<button class="chip-btn" onclick="'+fn+'">'+lbl+' &nbsp;×</button>';
}
function toggleAreaFilter(a){ toggleFilter('area', a); }

function render(){
  if(loaded<3) return;
  var cYr = document.getElementById('sel-curr').value;
  var pYr = document.getElementById('sel-prev').value;
  var todayYr = now.getFullYear().toString();
  var todayMo = now.getMonth();
  var live = (cYr===todayYr);
  var lastMo = live ? todayMo : 11;

  // Month range filter
  var moFrom = parseInt(document.getElementById('sel-from').value);
  var moTo   = parseInt(document.getElementById('sel-to').value);
  if(moTo < moFrom) moTo = moFrom;
  var moToCurr = live ? Math.min(moTo, lastMo) : moTo;
  var periodLbl = (moFrom===0 && moTo===11) ? 'Full Year' : MO[moFrom]+(moFrom===moToCurr?'':' – '+MO[moToCurr]);
  var periodLblPrev = (moFrom===0 && moTo===11) ? 'Full Year' : MO[moFrom]+(moFrom===moTo?'':' – '+MO[moTo]);
  document.getElementById('fnote').textContent = live && moFrom===0 && moTo===11 ? '★ YTD through '+MO[lastMo] : '📅 '+periodLbl+' '+cYr;

  // Helper: is a record's date within the current year + month range?
  function inRange(dateStr, yr, from, to){
    if(!(dateStr||'').startsWith(yr)) return false;
    var m = parseInt((dateStr||'').slice(5,7),10)-1;
    return m>=from && m<=to;
  }

  var cats = [
    {key:'incoming', lbl:'Incoming Form',  col:'#1e40af', lt:'#3b82f6', cls:'blue',   icon:'📋'},
    {key:'items',    lbl:'Incoming Items', col:'#0891b2', lt:'#22d3ee', cls:'cyan',   icon:'📦'},
    {key:'shipping', lbl:'Shipping',        col:'#7c3aed', lt:'#a78bfa', cls:'purple', icon:'🚚'}
  ];
  cats.forEach(function(c){
    c.curr = byMonth(allData[c.key], cYr);
    c.prev = byMonth(allData[c.key], pYr);
    c.ytdC = sum(c.curr, moFrom, moToCurr);
    c.ytdP = sum(c.prev, moFrom, moTo);
    c.totC = sum(c.curr,0,11);
    c.totP = sum(c.prev,0,11);
    c.moC  = c.curr[moToCurr];
    c.moP  = c.prev[moToCurr];
  });

  // WIP / Sales Order / Estoque — filtered by month range
  var destWip = new Array(12).fill(0);
  var destSO  = new Array(12).fill(0);
  var destStk = new Array(12).fill(0);
  Object.values(allData.items).forEach(function(r){
    if(!inRange(r.date, cYr, moFrom, moToCurr)) return;
    var m = parseInt((r.date||'').slice(5,7),10)-1;
    if(m<0||m>11) return;
    (r.lineItems||[]).forEach(function(li){
      if(li.binLocation==='WIP')            destWip[m]++;
      else if(li.applicationType==='Sales Order') destSO[m]++;
      else if(li.binLocation==='Stock')     destStk[m]++;
    });
  });

  // Normalize name: trim + title-case so "MIDLAND COURIER" == "Midland Courier"
  function normName(s){
    return (s||'').trim().replace(/\S+/g, function(w){
      return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
    });
  }

  // carrier counts — filtered by year + month range
  function buildCarrierCount(yearFilter, from, to){
    var cc = {};
    Object.values(allData.shipping).forEach(function(r){
      if(yearFilter){ if(!inRange(r.date, yearFilter, from, to)) return; }
      if(activeFilters.month!==null){ var rm=parseInt((r.date||'').slice(5,7),10)-1; if(rm!==activeFilters.month) return; }
      if(activeFilters.customer && normName(r.customer||'')!==activeFilters.customer) return;
      var raw = r.carrier||''; if(!raw) return;
      var name = normName(raw==='Other' ? (r.carrierOther||'Other') : raw);
      cc[name] = (cc[name]||0)+1;
    });
    return cc;
  }
  var carrierCount = buildCarrierCount(cYr, moFrom, moToCurr);
  var carrierLabel = cYr+(periodLbl!=='Full Year' ? ' · '+periodLbl : '');
  if(!Object.keys(carrierCount).length){
    carrierCount = buildCarrierCount(null, 0, 11);
    carrierLabel = 'All Years';
  }
  var topCarriers = Object.entries(carrierCount).sort(function(a,b){return b[1]-a[1];});

  // top customers — normalize case, filtered by month range
  var cc = {};
  Object.values(allData.shipping).forEach(function(r){
    if(!inRange(r.date, cYr, moFrom, moToCurr)) return;
    if(activeFilters.month!==null){ var rm=parseInt((r.date||'').slice(5,7),10)-1; if(rm!==activeFilters.month) return; }
    if(activeFilters.carrier && normName(r.carrier||'')!==activeFilters.carrier && normName(r.carrierOther||'')!==activeFilters.carrier) return;
    if(r.customer){ var cname=normName(r.customer); cc[cname]=(cc[cname]||0)+1; }
  });
  var top = Object.entries(cc).sort(function(a,b){return b[1]-a[1];}).slice(0,8);

  /* ── BUILD HTML ── */
  var h = '';

  /* KPI row */
  h += '<div class="kpi-row">';
  cats.forEach(function(c){
    var p = pct(c.ytdC, c.ytdP);
    var mp = pct(c.moC, c.moP);
    h += '<div class="kpi '+c.cls+'">'+
      '<div class="kpi-top"><div class="kpi-label">'+c.lbl+'</div><div class="kpi-icon">'+c.icon+'</div></div>'+
      '<div class="kpi-num">'+c.ytdC+'</div>'+
      '<div class="kpi-foot">'+badge(p)+'<span class="kpi-vs">vs '+pYr+' '+periodLblPrev+' ('+c.ytdP+')</span></div>'+
      '<div class="kpi-months">'+
        '<div class="kmo"><div class="kmo-val">'+c.moC+'</div><div class="kmo-lbl">'+MO[moToCurr]+' '+cYr+'</div></div>'+
        '<div class="kmo"><div class="kmo-val" style="color:var(--light)">'+c.moP+'</div><div class="kmo-lbl">'+MO[moToCurr]+' '+pYr+'</div></div>'+
        (mp!==null?'<div class="kmo"><div class="kmo-val" style="color:'+(mp>=0?'#059669':'#dc2626')+'">'+(mp>=0?'▲ ':'▼ ')+Math.abs(mp)+'%</div><div class="kmo-lbl">Month Δ</div></div>':'')+
      '</div>'+
    '</div>';
  });
  h += '</div>';

  /* Area banners — Electrical / Mechanical / Air Compressor / Generator */
  var woProcDateA = {};
  Object.values(allData.process).forEach(function(r){
    if(!r.wo||!r.receivedDate) return;
    var k=r.wo.trim().toUpperCase();
    if(!woProcDateA[k]||r.receivedDate<woProcDateA[k]) woProcDateA[k]=r.receivedDate;
  });
  var woShipDateA = {};
  Object.values(allData.shipping).forEach(function(r){
    if(!r.date) return;
    (r.workOrders||[]).forEach(function(wo){
      var k=wo.trim().toUpperCase();
      if(!woShipDateA[k]||r.date<woShipDateA[k]) woShipDateA[k]=r.date;
    });
  });
  var areaStats = {};
  AREAS.forEach(function(a){ areaStats[a]={total:0,active:0,shipped:0,onHold:0}; });
  Object.values(allData.incoming).forEach(function(r){
    if(!inRange(r.date,cYr,moFrom,moToCurr)) return;
    if(activeFilters.month!==null){ var rm=parseInt((r.date||'').slice(5,7),10)-1; if(rm!==activeFilters.month) return; }
    var a=r.area||''; if(!areaStats[a]) return;
    areaStats[a].total++;
    var k=(r.wo||'').trim().toUpperCase();
    if(k&&woShipDateA[k]) areaStats[a].shipped++;
    else if(k&&woProcDateA[k]) areaStats[a].onHold++;
    else areaStats[a].active++;
  });
  var areaIcons={'Electrical':'⚡','Mechanical':'⚙️','Air Compressor':'💨','Generator':'🔋'};
  h += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px">';
  AREAS.forEach(function(a){
    var st=areaStats[a]; var col=AREA_COLS[a];
    var asel = activeFilters.area === a;
    var adim = activeFilters.area && !asel;
    var cardStyle = 'overflow:hidden;cursor:pointer;transition:all .2s;'+(asel?'box-shadow:0 0 0 3px '+col+',0 4px 16px rgba(0,0,0,.15);transform:translateY(-2px);':'')+(adim?'opacity:.35;':'');
    h += '<div class="card" style="'+cardStyle+'" onclick="toggleAreaFilter(\''+a+'\')" title="Click to filter by '+a+'">'+
      '<div style="height:3px;background:'+col+'"></div>'+
      '<div style="padding:14px 16px 12px">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'+
          '<span style="font-size:.63rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">'+a+'</span>'+
          '<span style="font-size:1.1rem">'+areaIcons[a]+'</span>'+
        '</div>'+
        '<div style="font-size:2.2rem;font-weight:800;line-height:1;letter-spacing:-1px;color:'+col+'">'+st.total+'</div>'+
        '<div style="font-size:.61rem;color:var(--light);margin-top:2px;margin-bottom:10px">Equipment received · '+cYr+' '+periodLbl+'</div>'+
        '<div style="display:flex;gap:0;border-top:1px solid var(--border);padding-top:8px">'+
          '<div style="flex:1;text-align:center">'+
            '<div style="font-size:.95rem;font-weight:800;color:#059669">'+st.shipped+'</div>'+
            '<div style="font-size:.56rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--light)">Shipped</div>'+
          '</div>'+
          '<div style="width:1px;background:var(--border)"></div>'+
          '<div style="flex:1;text-align:center">'+
            '<div style="font-size:.95rem;font-weight:800;color:#dc2626">'+st.onHold+'</div>'+
            '<div style="font-size:.56rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--light)">On Hold</div>'+
          '</div>'+
          '<div style="width:1px;background:var(--border)"></div>'+
          '<div style="flex:1;text-align:center">'+
            '<div style="font-size:.95rem;font-weight:800;color:#d97706">'+st.active+'</div>'+
            '<div style="font-size:.56rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--light)">Active</div>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  });
  h += '</div>';

  /* Trend line (full width) */
  h += '<div class="r1"><div class="card">'+
    '<div class="ch"><div><div class="ct">Monthly Volume Trend</div><div class="cs">Solid — '+cYr+' &nbsp;|&nbsp; Dashed — '+pYr+'&nbsp;&nbsp;<span style="color:var(--blue3);font-style:italic">· Click a month to filter</span></div></div></div>'+
    '<div class="cb"><div class="cw" style="height:230px"><canvas id="c-trend"></canvas></div></div>'+
  '</div></div>';

  /* Top customers + Freight */
  h += '<div class="r2 g5545">'+
    '<div class="card">'+
      '<div class="ch"><div><div class="ct">Top Customers — Shipping</div><div class="cs">By number of outgoing shipments &nbsp;·&nbsp; '+cYr+' '+periodLbl+'&nbsp;&nbsp;<span style="color:var(--blue3);font-style:italic">· Click to filter</span></div></div></div>'+
      '<div class="cb"><div class="cw" style="height:'+Math.max(180, top.length*34)+'px"><canvas id="c-cust"></canvas></div></div>'+
    '</div>'+
    '<div class="card">'+
      '<div class="ch"><div><div class="ct">Carrier</div><div class="cs">By number of shipments &nbsp;·&nbsp; '+carrierLabel+'&nbsp;&nbsp;<span style="color:var(--blue3);font-style:italic">· Click to filter</span></div></div></div>'+
      '<div class="cb">'+
        '<div class="cw" style="height:'+(Math.max(160, topCarriers.length*34))+'px"><canvas id="c-fr"></canvas></div>'+
      '</div>'+
    '</div>'+
  '</div>';

  /* WIP / Sales Order / Estoque chart */
  var destTotal = destWip.reduce(function(a,b){return a+b;},0)+destSO.reduce(function(a,b){return a+b;},0)+destStk.reduce(function(a,b){return a+b;},0);
  var dWip=destWip.reduce(function(a,b){return a+b;},0), dSO=destSO.reduce(function(a,b){return a+b;},0), dStk=destStk.reduce(function(a,b){return a+b;},0);
  h += '<div class="r1"><div class="card">'+
    '<div class="ch"><div><div class="ct">Volume por Destino — Incoming Items</div><div class="cs">'+cYr+' · '+periodLbl+'</div></div></div>'+
    '<div class="cb" style="display:flex;align-items:center;gap:32px;flex-wrap:wrap">'+
      '<div style="flex:0 0 200px"><div class="cw" style="height:200px"><canvas id="c-dest"></canvas></div></div>'+
      '<div style="flex:1;min-width:200px;display:flex;flex-direction:column;gap:16px">'+
        destStatRow('WIP','#1e40af',dWip,destTotal)+
        destStatRow('Sales Order','#0891b2',dSO,destTotal)+
        destStatRow('Estoque','#7c3aed',dStk,destTotal)+
      '</div>'+
    '</div>'+
  '</div></div>';

  /* Table */
  h += '<div class="r1"><div class="card">'+
    '<div class="ch"><div><div class="ct">Month-by-Month Detail</div><div class="cs">'+cYr+' vs '+pYr+'</div></div></div>'+
    '<div class="cb" style="padding-top:10px">'+buildTable(cats,cYr,pYr,lastMo,live)+'</div>'+
  '</div></div>';

  document.getElementById('body').innerHTML = h;

  /* ── CHARTS ── */

  // Trend line
  dc('trend');
  var tDatasets = [];
  cats.forEach(function(c){
    tDatasets.push({label:c.lbl+' '+cYr, data:c.curr, borderColor:c.col, backgroundColor:c.col+'18',
      borderWidth:2.5, fill:false, tension:.35,
      pointRadius:MO.map(function(_,m){ return m===activeFilters.month?8:3; }),
      pointHoverRadius:MO.map(function(_,m){ return m===activeFilters.month?10:5; }),
      pointBackgroundColor:MO.map(function(_,m){ return m===activeFilters.month?'#f59e0b':c.col; }),
      pointBorderColor:MO.map(function(_,m){ return m===activeFilters.month?'#fff':c.col; }),
      pointBorderWidth:MO.map(function(_,m){ return m===activeFilters.month?2.5:0; })
    });
    tDatasets.push({label:c.lbl+' '+pYr, data:c.prev, borderColor:c.lt, backgroundColor:'transparent',
      borderWidth:1.5, borderDash:[5,4], pointRadius:2, pointHoverRadius:4, fill:false, tension:.35});
  });
  CH['trend'] = new Chart(document.getElementById('c-trend').getContext('2d'),{
    type:'line', data:{labels:MO, datasets:tDatasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      onClick:function(evt,elements){ if(elements.length) toggleFilter('month',elements[0].index); },
      onHover:function(evt,elements){ evt.native.target.style.cursor=elements.length?'pointer':'default'; },
      plugins:{
        legend:{position:'top',labels:{font:{size:10.5},boxWidth:16,padding:10,usePointStyle:true}},
        tooltip:{callbacks:{footer:function(){ return activeFilters.month!==null?'Click to deselect':'Click month to filter'; }}}
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{size:10},color:MO.map(function(_,m){ return m===activeFilters.month?'#1e40af':'#94a3b8'; })}},
        y:{beginAtZero:true,grid:{color:'#f0f4f8'},ticks:{font:{size:10},stepSize:1}}
      }
    }
  });

  // Top customers horizontal bar
  dc('cust');
  if(top.length){
    CH['cust'] = new Chart(document.getElementById('c-cust').getContext('2d'),{
      type:'bar',
      plugins:[ChartDataLabels],
      data:{
        labels:top.map(function(e){return e[0];}),
        datasets:[{
          label:'Shipments '+cYr,
          data:top.map(function(e){return e[1];}),
          backgroundColor:top.map(function(e,i){
            var base=['#1e40af','#2563eb','#3b82f6','#60a5fa','#93c5fd','#bfdbfe','#dbeafe','#eff6ff'][i]||'#bfdbfe';
            return (activeFilters.customer && e[0]!==activeFilters.customer)?'rgba(148,163,184,.2)':base;
          }),
          borderRadius:4, borderWidth:0
        }]
      },
      options:{
        indexAxis:'y', responsive:true, maintainAspectRatio:false,
        layout:{padding:{right:24}},
        onClick:function(evt,elements){ if(elements.length) toggleFilter('customer',top[elements[0].index][0]); },
        onHover:function(evt,elements){ evt.native.target.style.cursor=elements.length?'pointer':'default'; },
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:function(ctx){return ' '+ctx.parsed.x+' shipments';}}},
          datalabels:{
            anchor:'end', align:'end',
            font:{size:10,weight:'700'},
            color:function(ctx){ return (activeFilters.customer&&top[ctx.dataIndex][0]!==activeFilters.customer)?'#94a3b8':'#1e40af'; },
            formatter:function(v){return v>0?v:'';}
          }
        },
        scales:{
          x:{beginAtZero:true,grid:{color:'#f0f4f8'},ticks:{font:{size:10},stepSize:1}},
          y:{grid:{display:false},ticks:{font:{size:10.5}}}
        }
      }
    });
  } else {
    var el = document.getElementById('c-cust');
    if(el) el.parentElement.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:180px;color:#94a3b8;font-size:.8rem">No shipping data for '+cYr+'</div>';
  }

  // WIP / Sales Order / Estoque donut
  dc('dest');
  CH['dest'] = new Chart(document.getElementById('c-dest').getContext('2d'),{
    type:'doughnut',
    data:{
      labels:['WIP','Sales Order','Estoque'],
      datasets:[{
        data:[dWip,dSO,dStk],
        backgroundColor:['WIP','Sales Order','Estoque'].map(function(lbl,i){
          var base=['#1e40af','#0891b2','#7c3aed'][i];
          return (activeFilters.dest && lbl!==activeFilters.dest)?'rgba(148,163,184,.2)':base;
        }),
        borderWidth:0, hoverOffset:6
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'62%',
      onClick:function(evt,elements){
        if(elements.length) toggleFilter('dest',['WIP','Sales Order','Estoque'][elements[0].index]);
      },
      onHover:function(evt,elements){ evt.native.target.style.cursor=elements.length?'pointer':'default'; },
      plugins:{
        legend:{display:false},
        datalabels:{
          display:function(ctx){ return ctx.parsed>0; },
          color:'#fff',
          font:{size:11,weight:'800'},
          formatter:function(v){ return v>0?v:''; }
        }
      }
    }
  });

  // Carrier horizontal bar
  dc('fr');
  var carrierColors=['#1e40af','#2563eb','#3b82f6','#60a5fa','#93c5fd','#bfdbfe','#dbeafe','#eff6ff'];
  if(topCarriers.length){
    CH['fr'] = new Chart(document.getElementById('c-fr').getContext('2d'),{
      type:'bar',
      plugins:[ChartDataLabels],
      data:{
        labels:topCarriers.map(function(e){return e[0];}),
        datasets:[{
          label:'Shipments',
          data:topCarriers.map(function(e){return e[1];}),
          backgroundColor:topCarriers.map(function(e,i){
            var base=carrierColors[i%carrierColors.length];
            return (activeFilters.carrier && e[0]!==activeFilters.carrier)?'rgba(148,163,184,.2)':base;
          }),
          borderRadius:4, borderWidth:0
        }]
      },
      options:{
        indexAxis:'y', responsive:true, maintainAspectRatio:false,
        layout:{padding:{right:24}},
        onClick:function(evt,elements){ if(elements.length) toggleFilter('carrier',topCarriers[elements[0].index][0]); },
        onHover:function(evt,elements){ evt.native.target.style.cursor=elements.length?'pointer':'default'; },
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:function(ctx){return ' '+ctx.parsed.x+' shipments';}}},
          datalabels:{
            anchor:'end', align:'end',
            font:{size:10,weight:'700'},
            color:function(ctx){ return (activeFilters.carrier&&topCarriers[ctx.dataIndex][0]!==activeFilters.carrier)?'#94a3b8':'#1e40af'; },
            formatter:function(v){return v>0?v:'';}
          }
        },
        scales:{
          x:{beginAtZero:true,grid:{color:'#f0f4f8'},ticks:{font:{size:10},stepSize:1}},
          y:{grid:{display:false},ticks:{font:{size:10.5}}}
        }
      }
    });
  } else {
    var elFr = document.getElementById('c-fr');
    if(elFr) elFr.parentElement.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:160px;color:#94a3b8;font-size:.8rem">No carrier data for '+cYr+'</div>';
  }

  updateChips();
}

function destStatRow(label, color, val, total){
  var pct = total>0 ? Math.round(val/total*100) : 0;
  return '<div>'+
    '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">'+
      '<span style="font-size:.73rem;font-weight:700;color:#334155">'+label+'</span>'+
      '<span style="font-size:1rem;font-weight:800;color:'+color+'">'+val+' <span style="font-size:.68rem;font-weight:600;color:#94a3b8">('+pct+'%)</span></span>'+
    '</div>'+
    '<div style="height:7px;background:#f1f5f9;border-radius:4px;overflow:hidden">'+
      '<div style="height:100%;width:'+pct+'%;background:'+color+';border-radius:4px;transition:width .6s ease"></div>'+
    '</div>'+
  '</div>';
}

function buildTable(cats, cYr, pYr, lastMo, live){
  var h = '<div class="twrap"><table><thead>'+
    '<tr>'+
      '<th rowspan="2">Month</th>'+
      '<th colspan="3" class="cspan">Incoming Form</th>'+
      '<th colspan="3" class="cspan gs">Incoming Items</th>'+
      '<th colspan="3" class="cspan gs">Shipping</th>'+
    '</tr><tr>';
  cats.forEach(function(c,i){
    h += '<th'+(i?'class="gs"':'')+'>'+pYr+'</th><th>'+cYr+'</th><th>Δ%</th>';
  });
  h += '</tr></thead><tbody>';
  for(var m=0;m<12;m++){
    var dim = live && m>lastMo;
    var rowCls = dim ? 'dim' : (activeFilters.month===m ? 'row-hl row-click' : (activeFilters.month!==null ? 'row-dim row-click' : 'row-click'));
    h += '<tr class="'+rowCls+'" onclick="toggleFilter(\'month\','+m+')">'+
      '<td>'+MO[m]+(activeFilters.month===m?' ★':'')+'</td>';
    cats.forEach(function(c,i){
      var p = pct(c.curr[m], c.prev[m]);
      h += '<td class="pv'+(i?' gs':'')+'" >'+c.prev[m]+'</td>'+
           '<td class="cur">'+c.curr[m]+'</td>'+dlt(p);
    });
    h += '</tr>';
  }
  h += '<tr class="tot"><td>Total</td>';
  cats.forEach(function(c,i){
    h += '<td class="pv'+(i?' gs':'')+'">'+c.totP+'</td>'+
         '<td class="cur">'+c.totC+'</td>'+dlt(pct(c.totC,c.totP));
  });
  h += '</tr>';
  var ytdDiffers = live && cats.some(function(c){ return c.ytdC !== c.totC; });
  if(ytdDiffers){
    h += '<tr class="ytd-row"><td>YTD ★</td>';
    cats.forEach(function(c,i){
      h += '<td class="pv'+(i?' gs':'')+'">'+c.ytdP+'</td>'+
           '<td class="cur">'+c.ytdC+'</td>'+dlt(pct(c.ytdC,c.ytdP));
    });
    h += '</tr>';
  }
  h += '</tbody></table></div>';
  return h;
}
</script>
</body>
</html>
