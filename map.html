<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shipping Map — Source Atlantic SR</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --blue:#1e40af;--blue2:#2563eb;--blue3:#3b82f6;
  --text:#0f172a;--muted:#64748b;--light:#94a3b8;
  --border:#e2e8f0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;color:var(--text);overflow:hidden}
body{display:flex;flex-direction:column}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:13px 24px;gap:12px}
.hdr-title{font-size:.96rem;font-weight:700;color:#fff;line-height:1.2}
.hdr-sub{font-size:.65rem;color:rgba(255,255,255,.4);margin-top:1px}
.btn-nav{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.8);padding:6px 13px;border-radius:8px;font-size:.72rem;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit;transition:all .18s}
.btn-nav:hover{background:rgba(255,255,255,.2);color:#fff}

/* ── FILTER BAR ── */
.fbar{background:linear-gradient(90deg,#1e3a5f 0%,#1e40af 100%);border-bottom:2px solid #1e3a8a;padding:9px 24px;flex-shrink:0}
.fbar-inner{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.flabel{font-size:.7rem;font-weight:800;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.8px}
.fsel{padding:6px 11px;border:1.5px solid rgba(255,255,255,.3);border-radius:7px;font-size:.82rem;font-weight:700;color:#fff;background:rgba(255,255,255,.12);cursor:pointer;outline:none;font-family:inherit}
.fsel:hover,.fsel:focus{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.5)}
.fsel option{background:#1e3a5f;color:#fff}
.vs-chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:3px 9px;font-size:.7rem;font-weight:800;color:rgba(255,255,255,.9)}
.fsep{width:1px;height:24px;background:rgba(255,255,255,.25);margin:0 4px}
.fstat{font-size:.72rem;color:rgba(255,255,255,.75);margin-left:auto;display:flex;align-items:center;gap:8px}
.geo-spinner{display:none;font-size:.68rem;color:rgba(255,255,255,.55);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* ── MAP ── */
#map{flex:1;z-index:1}

/* ── LOADING OVERLAY ── */
#loading{position:fixed;inset:0;background:rgba(15,23,42,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px;color:#fff}
#loading-text{font-size:.9rem;font-weight:600}
#loading-sub{font-size:.72rem;opacity:.6}
.ld-bar{width:220px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;overflow:hidden;margin-top:4px}
.ld-fill{height:100%;background:#3b82f6;border-radius:2px;animation:ldanim 1.8s ease-in-out infinite}
@keyframes ldanim{0%{width:0;margin-left:0}60%{width:80%;margin-left:0}100%{width:0;margin-left:100%}}

/* ── LEGEND ── */
.legend{position:absolute;bottom:28px;left:14px;z-index:800;background:#fff;border-radius:10px;padding:10px 14px;box-shadow:0 2px 10px rgba(0,0,0,.14);border:1px solid var(--border);font-size:.68rem;min-width:130px}
.legend-title{font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.leg-bubble{border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex-shrink:0}
.leg-lbl{color:#334155;font-weight:600}

/* ── LEAFLET POPUP ── */
.leaflet-popup-content-wrapper{padding:0;border-radius:11px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.2);min-width:300px;max-width:400px}
.leaflet-popup-content{margin:0!important;width:100%!important}
.leaflet-popup-tip{background:#fff}

/* ── POPUP CONTENT ── */
.mp-head{background:linear-gradient(135deg,#1e40af,#2563eb);padding:13px 16px}
.mp-city{font-size:.96rem;font-weight:800;color:#fff}
.mp-count{font-size:.7rem;color:rgba(255,255,255,.75);margin-top:2px}
.mp-filters{font-size:.65rem;color:rgba(255,255,255,.55);margin-top:1px}
.mp-body{max-height:300px;overflow-y:auto;background:#fff}
.mp-row{display:grid;grid-template-columns:90px 1fr;gap:6px;padding:7px 14px;border-bottom:1px solid #f1f5f9;font-size:.72rem;font-family:'Inter',system-ui,sans-serif}
.mp-row:last-child{border-bottom:none}
.mp-row:hover{background:#f8faff}
.mp-date{color:var(--muted);font-weight:600;padding-top:1px}
.mp-cust{font-weight:700;color:#1e293b;margin-bottom:3px;font-size:.74rem}
.mp-orders{font-size:.67rem;line-height:1.8}
.mp-order-link{color:#2563eb;font-weight:700;text-decoration:none;display:inline-block;padding:1px 6px;border-radius:4px;background:#eff6ff;border:1px solid #bfdbfe;transition:all .15s}
.mp-order-link:hover{background:#2563eb;color:#fff;border-color:#2563eb}
.mp-empty{padding:16px;text-align:center;color:var(--light);font-size:.75rem}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <div style="display:flex;align-items:center;gap:12px">
      <img src="logo.png" alt="SA" style="height:34px;border-radius:5px;background:#fff;padding:2px 6px">
      <div>
        <div class="hdr-title">Shipping Map</div>
        <div class="hdr-sub">Source Atlantic — Delivery Locations</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <a class="btn-nav" href="stats.html">📊 Dashboard</a>
      <a class="btn-nav" href="index.html">← App</a>
    </div>
  </div>
</div>

<div class="fbar">
  <div class="fbar-inner">
    <span class="flabel">Year</span>
    <select class="fsel" id="sel-year" onchange="applyFilters()">
      <option value="">All Years</option>
      <option value="2026" selected>2026</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
    </select>
    <div class="fsep"></div>
    <span class="flabel">Period</span>
    <select class="fsel" id="sel-from" onchange="applyFilters()">
      <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option>
      <option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option>
      <option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option>
      <option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option>
    </select>
    <span class="vs-chip">to</span>
    <select class="fsel" id="sel-to" onchange="applyFilters()">
      <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option>
      <option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option>
      <option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option>
      <option value="9">Oct</option><option value="10">Nov</option><option value="11" selected>Dec</option>
    </select>
    <div class="fsep"></div>
    <span class="fstat">
      <span id="map-stat">—</span>
      <span class="geo-spinner" id="geo-spinner">● Geocoding…</span>
    </span>
  </div>
</div>

<div id="map"></div>

<div id="loading">
  <div id="loading-text">Loading shipping data…</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
  <div id="loading-sub">Connecting to Firebase</div>
</div>

<script>
var firebaseConfig = {
  apiKey:            'AIzaSyBuS3afVcx3W-zfgZfDYIutNltuEfP8Fhc',
  authDomain:        'source-atlantic-sr.firebaseapp.com',
  databaseURL:       'https://source-atlantic-sr-default-rtdb.firebaseio.com',
  projectId:         'source-atlantic-sr',
  storageBucket:     'source-atlantic-sr.firebasestorage.app',
  messagingSenderId: '953329380095',
  appId:             '1:953329380095:web:f7865dda88a33ff9457aca'
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ── LEAFLET MAP ──
var map = L.map('map', {
  center: [53, -90],
  zoom: 5,
  zoomControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// ── LEGEND ──
var legendDiv = L.control({position:'bottomleft'});
legendDiv.onAdd = function(){
  var d = L.DomUtil.create('div','legend');
  d.innerHTML =
    '<div class="legend-title">Shipments</div>'+
    legRow(28,'#60a5fa','1 – 2')+
    legRow(34,'#2563eb','3 – 9')+
    legRow(40,'#1d4ed8','10 – 19')+
    legRow(46,'#1e3a8a','20+');
  return d;
};
legendDiv.addTo(map);
function legRow(sz,col,lbl){
  return '<div class="leg-row">'+
    '<div class="leg-bubble" style="width:'+sz+'px;height:'+sz+'px;background:'+col+';font-size:'+(sz>36?'9':'8')+'px"></div>'+
    '<span class="leg-lbl">'+lbl+'</span>'+
  '</div>';
}

// ── GEOCODE CACHE + QUEUE ──
var GEO_KEY = 'sa_geocache_v2';
var geoCache = {};
try { geoCache = JSON.parse(localStorage.getItem(GEO_KEY)||'{}'); } catch(e){}

var geoQueue   = [];
var geoRunning = false;
var geoPending = 0;

function geocodeCity(locKey, city, province, country, cb){
  if(locKey in geoCache){ cb(geoCache[locKey]); return; }
  geoPending++;
  updateGeoSpinner();
  geoQueue.push({locKey:locKey, city:city, province:province, country:country, cb:cb});
  if(!geoRunning) runGeoQueue();
}

function runGeoQueue(){
  if(!geoQueue.length){ geoRunning=false; return; }
  geoRunning = true;
  var item = geoQueue.shift();
  var cn = (item.country||'').toUpperCase();
  var countryName = (cn==='USA'||cn==='US'||cn==='UNITED STATES') ? 'United States' : 'Canada';
  var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&email=lcdsilva@hotmail.com' +
    '&city=' + encodeURIComponent(item.city) +
    '&state=' + encodeURIComponent(item.province) +
    '&country=' + encodeURIComponent(countryName);
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data && data.length){
        var coords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
        geoCache[item.locKey] = coords;
      } else {
        geoCache[item.locKey] = null; // mark as not found so we don't retry
      }
      localStorage.setItem(GEO_KEY, JSON.stringify(geoCache));
      item.cb(geoCache[item.locKey]);
      geoPending = Math.max(0, geoPending-1);
      updateGeoSpinner();
      setTimeout(runGeoQueue, 1100);
    })
    .catch(function(){
      geoPending = Math.max(0, geoPending-1);
      updateGeoSpinner();
      setTimeout(runGeoQueue, 1100);
    });
}

function updateGeoSpinner(){
  var sp = document.getElementById('geo-spinner');
  if(sp) sp.style.display = geoPending > 0 ? 'inline' : 'none';
}

// ── DATA ──
var shippingData = {};
var markersLayer = L.layerGroup().addTo(map);

db.ref('shipping_receiving/shipping').on('value', function(snap){
  shippingData = snap.val() || {};
  document.getElementById('loading').style.display = 'none';
  applyFilters();
});

// ── FILTERS + RENDER ──
function applyFilters(){
  var yr   = document.getElementById('sel-year').value;
  var from = parseInt(document.getElementById('sel-from').value);
  var to   = parseInt(document.getElementById('sel-to').value);
  if(to < from) to = from;

  // Group by location
  var locations = {};
  var totalShipments = 0;

  Object.values(shippingData).forEach(function(r){
    var date = r.date || '';
    if(yr && !date.startsWith(yr)) return;
    var m = parseInt(date.slice(5,7),10) - 1;
    if(!isNaN(m) && (m < from || m > to)) return;

    var city    = (r.city     || '').trim();
    var prov    = (r.province || '').trim();
    var country = (r.country  || 'Canada').trim();
    if(!city) return;

    var locKey = (city+'|'+prov+'|'+country).toLowerCase();
    if(!locations[locKey]){
      locations[locKey] = {city:city, province:prov, country:country, shipments:[]};
    }
    locations[locKey].shipments.push(r);
    totalShipments++;
  });

  var locCount = Object.keys(locations).length;
  document.getElementById('map-stat').textContent =
    locCount + ' location' + (locCount!==1?'s':'') + ' · ' + totalShipments + ' shipment' + (totalShipments!==1?'s':'');

  markersLayer.clearLayers();

  Object.entries(locations).forEach(function(entry){
    var locKey = entry[0];
    var loc    = entry[1];

    geocodeCity(locKey, loc.city, loc.province, loc.country, function(coords){
      if(!coords) return; // not found

      var count  = loc.shipments.length;
      var sz     = Math.min(28 + Math.log(count) * 9, 52);
      var color  = count >= 20 ? '#1e3a8a' : count >= 10 ? '#1d4ed8' : count >= 3 ? '#2563eb' : '#60a5fa';
      var fSize  = sz > 36 ? 11 : 9;

      var icon = L.divIcon({
        html: '<div style="width:'+sz+'px;height:'+sz+'px;background:'+color+';border:2.5px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:'+fSize+'px;font-weight:800;box-shadow:0 2px 8px rgba(0,0,0,.28);cursor:pointer">'+count+'</div>',
        iconSize:    [sz, sz],
        iconAnchor:  [sz/2, sz/2],
        popupAnchor: [0, -sz/2 - 4],
        className:   ''
      });

      var marker = L.marker(coords, {icon:icon});

      // Build popup
      var sorted = loc.shipments.slice().sort(function(a,b){
        return (b.date||'').localeCompare(a.date||'');
      });

      var rows = sorted.map(function(r){
        var salesOrders = (r.salesOrders||[]).filter(Boolean);
        var workOrders  = (r.workOrders ||[]).filter(Boolean);
        var orderLinks  = [];
        salesOrders.forEach(function(o){
          orderLinks.push('<a href="index.html?goto=shipping&q='+encodeURIComponent(o)+'" target="_blank" class="mp-order-link">SO: '+o+'</a>');
        });
        workOrders.forEach(function(o){
          orderLinks.push('<a href="index.html?goto=shipping&q='+encodeURIComponent(o)+'" target="_blank" class="mp-order-link">WO: '+o+'</a>');
        });
        return '<div class="mp-row">'+
          '<div class="mp-date">'+(r.date||'—')+'</div>'+
          '<div>'+
            '<div class="mp-cust">'+(r.customer||'—')+'</div>'+
            (orderLinks.length
              ? '<div class="mp-orders">'+orderLinks.join('<br>')+'</div>'
              : '')+
          '</div>'+
        '</div>';
      }).join('');

      var popup =
        '<div class="mp-head">'+
          '<div class="mp-city">📍 '+loc.city+(loc.province?', '+loc.province:'')+'</div>'+
          '<div class="mp-count">'+count+' shipment'+(count!==1?'s':'')+'</div>'+
        '</div>'+
        '<div class="mp-body">'+(rows||'<div class="mp-empty">No orders found</div>')+'</div>';

      marker.bindPopup(popup, {maxWidth:400, minWidth:300, autoPan:true});
      markersLayer.addLayer(marker);
    });
  });
}
</script>
</body>
</html>
